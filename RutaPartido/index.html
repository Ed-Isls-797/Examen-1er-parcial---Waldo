<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Deportes - Sports Map</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />

    <style>
        :root {
            --azul-acero: #011b30;
            --dorado-oliva: #ff4c05;
            --blanco-hueso: #ffffff;
            --oscuro: #2C3E50;
            --gris-claro: #f4f6f7;
            --borde: #e0e0e0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--blanco-hueso);
            color: var(--oscuro);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            background-color: var(--azul-acero);
            color: var(--blanco-hueso);
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .catalog-container {
            max-width: 1200px;
            width: 90%;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            padding-bottom: 40px;
        }

        .card-deporte {
            background-color: #ffffff;
            border: 1px solid #e0e0e0;
            border-top: 8px solid var(--azul-acero);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            text-decoration: none;
            color: inherit;
            overflow: hidden;
        }

        .card-deporte:hover {
            transform: translateY(-8px);
            border-top-color: var(--dorado-oliva);
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.15);
        }

        .image-box {
            width: 100%;
            height: 160px;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 15px;
            background-color: #f0f0f0;
        }

        .image-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .card-deporte h2 {
            font-size: 1.4rem;
            color: var(--oscuro);
            margin-bottom: 10px;
        }

        .btn-explorar {
            background-color: var(--azul-acero);
            color: var(--blanco-hueso);
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
        }

        .main-map-section {
            max-width: 1200px;
            width: 90%;
            display: flex;
            height: 600px;
            margin-bottom: 50px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            border: 1px solid var(--borde);
        }

        .sidebar {
            width: 350px;
            background-color: var(--gris-claro);
            border-right: 1px solid var(--borde);
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
        }

        .sidebar h3 {
            font-size: 1.3rem;
            color: var(--azul-acero);
            margin-bottom: 15px;
            border-bottom: 2px solid var(--dorado-oliva);
            padding-bottom: 5px;
        }

        .info-block {
            background: #ffffff;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 1px solid var(--borde);
        }

        .info-block h4 {
            font-size: 0.95rem;
            color: var(--oscuro);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .info-block h4 i {
            color: var(--dorado-oliva);
        }

        select {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid var(--borde);
            font-size: 0.9rem;
            outline: none;
        }

        .btn-action {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: none;
            background-color: var(--azul-acero);
            color: #fff;
            font-weight: bold;
            margin-bottom: 12px;
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background 0.2s;
        }

        .btn-action:hover {
            background-color: var(--dorado-oliva);
        }

        .btn-action:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }

        .share-container {
            display: flex;
            gap: 10px;
            margin-top: auto;
            padding-top: 15px;
        }

        .btn-share {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            color: white;
            font-weight: bold;
            font-size: 0.85rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-share.whatsapp { background-color: #25D366; }
        .btn-share.facebook { background-color: #1877F2; }

        .map-container {
            flex: 1;
            background-color: #e5e3df;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        @media (max-width: 768px) {
            .main-map-section { flex-direction: column; height: auto; }
            .sidebar { width: 100%; height: auto; }
            .map-container { height: 400px; }
        }
    </style>
</head>

<body>

    <header>
        <h1>Portal Deportivo</h1>
        <p>Selecciona una disciplina para explorar sus estadios, rutas y promociones</p>
    </header>

    <main class="catalog-container">
        <div class="card-deporte" data-sport="americano">
            <div class="image-box"><img src="img/amfjpg.jpg" alt="Americano"></div>
            <h2>Fútbol Americano</h2>
            <button class="btn-explorar">Explorar Estadios</button>
        </div>
        <div class="card-deporte" data-sport="futbol">
            <div class="image-box"><img src="img/Fut.jpg" alt="Fútbol"></div>
            <h2>Fútbol</h2>
            <button class="btn-explorar">Explorar Estadios</button>
        </div>
        <div class="card-deporte" data-sport="basquet">
            <div class="image-box"><img src="img/basquet.jpg" alt="Básquetbol"></div>
            <h2>Básquetbol</h2>
            <button class="btn-explorar">Explorar Estadios</button>
        </div>
    </main>

    <section class="main-map-section">
        <aside class="sidebar">
            <h3>Selección de Estadios</h3>
            
            <div class="info-block">
                <h4><i class="fa-solid fa-trophy"></i> Disciplina</h4>
                <select id="sport-selector">
                    <option value="">Selecciona un deporte...</option>
                    <option value="americano">Fútbol Americano</option>
                    <option value="futbol">Fútbol</option>
                    <option value="basquet">Básquetbol</option>
                </select>
            </div>

            <div class="info-block">
                <h4><i class="fa-solid fa-stadium"></i> Estadios disponibles</h4>
                <select id="stadium-selector" disabled>
                    <option value="">Selecciona primero un deporte...</option>
                </select>
            </div>

            <button class="btn-action" id="btn-my-location">
                <i class="fa-solid fa-location-crosshairs"></i> Mostrar mi ubicación
            </button>

            <button class="btn-action" id="btn-generate-route" disabled>
                <i class="fa-solid fa-route"></i> Generar ruta
            </button>

            <div class="info-block" id="stadium-info-block" style="display: none;">
                <h4><i class="fa-solid fa-circle-info"></i> Detalles del Estadio</h4>
                <p id="stadium-details"></p>
            </div>

            <div class="info-block" id="promo-info-block" style="display: none;">
                <h4><i class="fa-solid fa-tag"></i> Promociones</h4>
                <p id="promo-details"></p>
            </div>

            <div class="share-container">
                <button class="btn-share whatsapp" id="share-ws"><i class="fa-brands fa-whatsapp"></i> WhatsApp</button>
                <button class="btn-share facebook" id="share-fb"><i class="fa-brands fa-facebook-f"></i> Facebook</button>
            </div>
        </aside>

        <div class="map-container">
            <div id="map"></div>
        </div>
    </section>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
    
    <script src="Clases/Equipo.js"></script>
    <script src="Clases/EquiposAmericano.js"></script>
    <script src="Clases/EquiposFutbol.js"></script>
    <script src="Clases/EquiposBaskquet.js"></script>
    <script src="Clases/Promocion.js"></script>
    
    <script src="app.js"></script>
</body>
</html>
